name: Bug report
description: Something is broken or behaving unexpectedly.
labels: ['bug']
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps for someone else to reproduce the issue.
      placeholder: |
        1. Run `just up`
        2. Log in as ...
        3. Click ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit / branch
      description: Output of `git rev-parse --short HEAD`
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      render: shell
    validations:
      required: false

<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="icon" href="%sveltekit.assets%/favicon.png" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
	<script>
		// Hydration watchdog: if SvelteKit JS hasn't hydrated after 6s,
		// auto-reload up to 2 times, then show a fallback UI.
		setTimeout(function() {
			if (window.__sveltekit_hydrated) return;

			var url = new URL(window.location.href);
			var prev = parseInt(url.searchParams.get('_r') || '0', 10);

			if (prev < 2) {
				url.searchParams.set('_r', String(prev + 1));
				window.location.replace(url.toString());
				return;
			}

			// Retries exhausted — show fallback UI
			document.body.innerHTML =
				'<div style="display:flex;min-height:100vh;align-items:center;justify-content:center">' +
				'<div style="display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;padding:24px;font-family:Inter,system-ui,sans-serif">' +
				'<p style="color:#888;font-size:15px">The application failed to load.<br>This can happen on slow connections or if your browser cache is stale.</p>' +
				'<button onclick="location.href=location.pathname" style="padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500">Reload Page</button>' +
				'<a href="/auth/login" style="color:#2563eb;font-size:13px;text-decoration:underline">Go to login page</a>' +
				'</div></div>';
		}, 6000);
	</script>
</body>

</html>

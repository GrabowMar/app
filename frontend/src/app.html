<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="icon" href="%sveltekit.assets%/favicon.png" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet" />
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
	<script>
		// Hard cache-busting reload: clears caches + unregisters service workers,
		// then reloads with a fresh query param so the browser refetches HTML.
		window.__hardReload = function() {
			var done = function() {
				var url = new URL(window.location.href);
				url.searchParams.delete('_r');
				url.searchParams.set('_cb', Date.now().toString(36));
				window.location.replace(url.toString());
			};
			try {
				var tasks = [];
				if (window.caches && caches.keys) {
					tasks.push(caches.keys().then(function(keys) {
						return Promise.all(keys.map(function(k) { return caches.delete(k); }));
					}));
				}
				if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
					tasks.push(navigator.serviceWorker.getRegistrations().then(function(regs) {
						return Promise.all(regs.map(function(r) { return r.unregister(); }));
					}));
				}
				if (tasks.length) {
					Promise.all(tasks).then(done, done);
					setTimeout(done, 1500);
				} else {
					done();
				}
			} catch (e) { done(); }
		};

		// Fallback UI helper — used by both watchdog and error handlers
		window.__showFallback = function() {
			document.body.innerHTML =
				'<div style="display:flex;min-height:100vh;align-items:center;justify-content:center">' +
				'<div style="display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;padding:24px;font-family:Inter,system-ui,sans-serif">' +
				'<p style="color:#888;font-size:15px">The application failed to load.<br>This can happen on slow connections or if your browser cache is stale.</p>' +
				'<button onclick="window.__hardReload()" style="padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500">Reload Page</button>' +
				'<a href="/auth/login" style="color:#2563eb;font-size:13px;text-decoration:underline">Go to login page</a>' +
				'</div></div>';
		};

		// Proactively unregister any leftover service worker (e.g. from old PWA build).
		// This eliminates the recurring /sw.js 404 noise and prevents SW-cached stale assets.
		if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
			navigator.serviceWorker.getRegistrations().then(function(regs) {
				regs.forEach(function(r) { r.unregister(); });
			}).catch(function() {});
		}

		// Catch dynamic import failures (the main cause of hydration breakage
		// after a redeploy invalidates old chunk hashes).
		window.addEventListener('unhandledrejection', function(e) {
			if (window.__sveltekit_hydrated) return;
			var msg = (e.reason && (e.reason.message || String(e.reason))) || '';
			// On the FIRST chunk-load failure, do an automatic hard reload once
			// (cache-busted) so users on a stale cache recover seamlessly.
			if (/Failed to fetch dynamically imported module|Importing a module script failed|ChunkLoadError/i.test(msg)) {
				e.preventDefault();
				var url = new URL(window.location.href);
				if (!url.searchParams.has('_cb')) {
					window.__hardReload();
					return;
				}
				window.__showFallback();
			}
		});

		// Hydration watchdog: if SvelteKit JS hasn't hydrated after 6s,
		// auto-reload (cache-busted) up to 2 times, then show fallback UI.
		setTimeout(function() {
			if (window.__sveltekit_hydrated) {
				// Strip recovery query params from the URL so a future failure
				// can recover again (otherwise users get stuck once _r=2).
				try {
					var u = new URL(window.location.href);
					if (u.searchParams.has('_r') || u.searchParams.has('_cb')) {
						u.searchParams.delete('_r');
						u.searchParams.delete('_cb');
						window.history.replaceState(window.history.state, '', u.toString());
					}
				} catch (_) {}
				return;
			}

			var url = new URL(window.location.href);
			var prev = parseInt(url.searchParams.get('_r') || '0', 10);

			if (prev < 2) {
				url.searchParams.set('_r', String(prev + 1));
				url.searchParams.set('_cb', Date.now().toString(36));
				window.location.replace(url.toString());
				return;
			}

			window.__showFallback();
		}, 6000);

		// Also clean up _r/_cb query params *as soon as* hydration completes,
		// independently of the 6s watchdog, so the address bar stays clean.
		(function pollHydration() {
			var start = Date.now();
			var t = setInterval(function() {
				if (window.__sveltekit_hydrated) {
					clearInterval(t);
					try {
						var u = new URL(window.location.href);
						if (u.searchParams.has('_r') || u.searchParams.has('_cb')) {
							u.searchParams.delete('_r');
							u.searchParams.delete('_cb');
							window.history.replaceState(window.history.state, '', u.toString());
						}
					} catch (_) {}
				} else if (Date.now() - start > 10000) {
					clearInterval(t);
				}
			}, 250);
		})();
	</script>
</body>

</html>

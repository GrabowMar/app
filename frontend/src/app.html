<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="icon" href="%sveltekit.assets%/favicon.png" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
	<script>
		// Hydration watchdog: if the page is still showing a loading spinner
		// after 6 seconds (e.g. due to stale cached JS), force a clean reload.
		setTimeout(function() {
			var spinner = document.querySelector('.animate-spin');
			if (spinner && !window.__sveltekit_hydrated) {
				// Add cache-busting param to force fresh resources
				var url = new URL(window.location.href);
				var prev = parseInt(url.searchParams.get('_r') || '0', 10);
				if (prev < 2) {
					url.searchParams.set('_r', String(prev + 1));
					window.location.replace(url.toString());
				}
			}
		}, 6000);
	</script>
</body>

</html>

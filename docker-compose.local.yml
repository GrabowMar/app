volumes:
  llm_lab_local_postgres_data: {}
  llm_lab_local_postgres_data_backups: {}
  llm_lab_local_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: llm_lab_local_django
    depends_on:
      - postgres
      - redis
      - mailpit
    volumes:
      - /app/.venv
      - .:/app:z
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - '8001:8000'
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: llm_lab_production_postgres
    volumes:
      - llm_lab_local_postgres_data:/var/lib/postgresql/data
      - llm_lab_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres

  mailpit:
    image: docker.io/axllent/mailpit:latest
    ports:
      - "8025:8025"

  redis:
    image: docker.io/redis:8.6
    volumes:
      - llm_lab_local_redis_data:/data

  celeryworker:
    <<: *django
    image: llm_lab_local_celeryworker
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: llm_lab_local_celerybeat
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: llm_lab_local_flower
    ports:
      - '5555:5555'
    command: /start-flower

  frontend:
    build:
      context: .
      dockerfile: ./compose/local/frontend/Dockerfile
    image: llm_lab_local_frontend
    restart: unless-stopped
    depends_on:
      - django
    volumes:
      - ./frontend:/app/frontend:z
      - /app/frontend/node_modules
    environment:
      - API_TARGET=http://django:8000
      - ORIGIN=https://grabowmar.ovh
      - PORT=8080
      - HOST=0.0.0.0
      - NODE_ENV=production
    ports:
      - '8000:8080'
    command: ["node", "build/index.js"]
